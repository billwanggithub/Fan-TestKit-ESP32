## Managed components fetched by the ESP-IDF Component Manager on first build.
## Docs: https://docs.espressif.com/projects/idf-component-manager/
##
## esp_tinyusb is pinned to the 1.7.x series intentionally. The 2.x rewrite
## requires the application to hand-build a composite configuration
## descriptor (tinyusb_desc_config_t.full_speed_config), while 1.x still
## auto-generates the descriptor from Kconfig for the common HID+CDC case
## that this firmware needs. If you upgrade to 2.x later, usb_composite.c
## and usb_descriptors.c must both be rewritten.
dependencies:
  idf:
    version: ">=6.0.0"
  espressif/esp_tinyusb:
    version: "~1.7.0"
  # cJSON — used by net_dashboard/ws_handler.c and captive_portal.c. In the
  # previous BLE-provisioning setup it came in transitively via
  # `espressif/network_provisioning`; now that we dropped BLE provisioning
  # we must list it as a direct dependency so the component manager keeps
  # it around after `NOTICE: Deleting unused components`.
  espressif/cjson:
    version: "^1.7.19"
  # mdns was a built-in component in IDF v5.x but moved to the component
  # manager in v6.0. Used by components/net_dashboard/mdns_svc.c to
  # advertise `esp32-pwm.local` once STA is up.
  espressif/mdns:
    version: "^1.8.0"
